<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mathe mit Pfiff – Online-Tools</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f0;
    color: #2c2c2c;
    -webkit-tap-highlight-color: transparent;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  header p {
    margin-top: 8px;
    font-size: 15px;
    color: #888;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .card {
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .card:active {
    transform: scale(0.97);
  }

  @media (hover: hover) {
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }
  }

  .card-icon {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
  }

  .card-body {
    padding: 0 20px 20px;
  }

  .card-body h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .card-body p {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
  }

  footer {
    text-align: center;
    margin-top: 64px;
    font-size: 13px;
    color: #bbb;
  }
</style>
</head>
<body>

<div class="page">
  <header>
    <h1>Mathe mit Pfiff – Online-Tools</h1>
    <p>Interaktive Werkzeuge zum Knobeln, Entdecken und Lernen</p>
  </header>

  <div class="grid" id="grid">

    <a class="card" href="eierei/index.html">
      <div class="card-icon" style="background: linear-gradient(135deg, #ffecd2, #fcb69f);">🥚</div>
      <div class="card-body">
        <h2>Eierei</h2>
        <p>Knobelspiel auf dem 5×5 Feld. Springe über Steine, bis nur noch einer in der Mitte liegt.</p>
      </div>
    </a>

    <!-- Weitere Projekte hier ergänzen:
    <a class="card" href="projekt/index.html">
      <div class="card-icon" style="background: linear-gradient(135deg, #a1c4fd, #c2e9fb);">🔢</div>
      <div class="card-body">
        <h2>Projektname</h2>
        <p>Kurze Beschreibung des Projekts.</p>
      </div>
    </a>
    -->

  </div>

  <footer>&copy; Dominik Bechinie | Mathe mit Pfiff | 2026</footer>
</div>

</body>
</html>
